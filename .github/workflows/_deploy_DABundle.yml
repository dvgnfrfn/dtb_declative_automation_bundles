name: Deploy Declarative Automation Bundles

on:
  workflow_dispatch:
    inputs:
      prm_enviroment: {
        type: choice,
        required: true,
        options: [dev, prod], default: 'dev',
      }
      prm_project_path: { type: string, required: true }

  workflow_call:
    inputs:
      prm_enviroment:   { type: string, required: true }
      prm_project_path: { type: string, required: true }
      
jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.prm_project_path }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate -t ${{ inputs.prm_enviroment }}
        env:
          DATABRICKS_HOST:  ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      - name: Deploy bundle
        run: databricks bundle deploy -t ${{ inputs.prm_enviroment }}
        env:
          DATABRICKS_HOST:  ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
