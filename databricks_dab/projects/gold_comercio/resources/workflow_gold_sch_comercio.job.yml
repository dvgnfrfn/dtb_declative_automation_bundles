resources:
  jobs:
    workflow_gold_sch_comercio:
      name: workflow_gold_sch_comercio
      tasks:
        - task_key: launch
          notebook_task:
            notebook_path: gold/sch_comercio/nb_comercio
            source: GIT
      git_source:
        git_url: https://github.com/dvgnfrfn/dtb_declative_automation_bundles
        git_provider: gitHub
        git_branch: 'main'
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
